name: backend

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Runs on every PR (no paths filter) so branch protection can require this
# check — otherwise a doc-only PR would stall waiting for a check that
# never reports. The job is ~20s; gating cost is negligible.

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
