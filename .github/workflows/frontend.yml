name: frontend

on:
  push:
    branches: [main]
    paths:
      - "chrome-extension/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "chrome-extension/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: manifest.json is valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: All JS files parse
        run: |
          # node --check is a syntax-only parse; doesn't execute the file.
          # Catches typos / unbalanced braces before they ship to users.
          fail=0
          for f in $(find . -maxdepth 2 -name "*.js" -not -name "katex.min.js"); do
            if ! node --check "$f"; then
              echo "::error file=chrome-extension/$f::parse error"
              fail=1
            fi
          done
          exit $fail

      - name: manifest.json declares all referenced files
        run: |
          # Sanity check: every file listed in manifest.json content_scripts /
          # background / action exists on disk. Catches typos in file paths.
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            const fs = require('fs');
            const missing = [];
            const check = p => { if (!fs.existsSync(p)) missing.push(p); };
            (m.content_scripts || []).forEach(cs => {
              (cs.js || []).forEach(check);
              (cs.css || []).forEach(check);
            });
            if (m.background?.service_worker) check(m.background.service_worker);
            if (m.action?.default_popup) check(m.action.default_popup);
            for (const size of Object.values(m.icons || {})) check(size);
            if (missing.length) {
              console.error('Missing files referenced in manifest.json:', missing);
              process.exit(1);
            }
          "
