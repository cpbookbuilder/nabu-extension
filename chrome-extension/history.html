<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nabu — History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #202124;
      color: #e3e3e3;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px 0;
    }
    h1 { font-size: 18px; font-weight: 500; }
    .header-actions { display: flex; gap: 10px; }
    button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #3c4043;
      background: none;
      color: #9aa0a6;
      transition: background 0.1s, color 0.1s;
    }
    button:hover { background: #3c4043; color: #e3e3e3; }
    button.danger { color: #f28b82; }
    button.danger:hover { background: rgba(242,139,130,0.1); }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 0;
      padding: 16px 32px 0;
      border-bottom: 1px solid #3c4043;
      margin-top: 12px;
    }
    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #9aa0a6;
      border-radius: 0;
    }
    .tab.active { color: #8ab4f8; border-bottom-color: #8ab4f8; }
    .tab:hover:not(.active) { color: #e3e3e3; background: none; }
    #tab-count { font-size: 11px; color: #5f6368; padding: 0 32px; margin-top: 8px; height: 16px; }

    .search-bar { padding: 16px 32px; }
    .search-bar input {
      width: 100%; background: #303134; border: 1px solid #3c4043;
      border-radius: 8px; padding: 9px 14px; color: #e3e3e3;
      font-size: 14px; font-family: inherit; outline: none;
    }
    .search-bar input:focus { border-color: #8ab4f8; }
    .search-bar input::placeholder { color: #5f6368; }

    .list {
      max-width: 800px; margin: 16px auto; padding: 0 32px;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Thread entries */
    .entry {
      background: #2d2e2f; border-radius: 10px; padding: 16px 20px;
      cursor: pointer; transition: background 0.1s; border: 1px solid transparent;
    }
    .entry:hover { background: #303134; border-color: #3c4043; }
    .entry-anchor {
      font-size: 12px; color: #fdd663; font-style: italic; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .entry-question { font-size: 15px; color: #e3e3e3; margin-bottom: 8px; line-height: 1.4; }
    .entry-context {
      font-size: 12px; color: #9aa0a6; line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .entry-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: #5f6368; }
    .entry-url {
      background: #3c4043; padding: 2px 8px; border-radius: 4px;
      max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Todo / Reminder entries */
    .item {
      background: #2d2e2f; border-radius: 10px; padding: 14px 16px;
      border: 1px solid transparent; transition: background 0.1s;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .item:hover { background: #303134; border-color: #3c4043; }
    .item-check {
      width: 18px; height: 18px; border-radius: 4px; border: 2px solid #5f6368;
      flex-shrink: 0; cursor: pointer; margin-top: 2px; appearance: none;
      background: none; display: flex; align-items: center; justify-content: center;
    }
    .item-check:checked { background: #8ab4f8; border-color: #8ab4f8; }
    .item-check:checked::after { content: '✓'; color: #202124; font-size: 11px; font-weight: 700; }
    .item-body { flex: 1; cursor: pointer; min-width: 0; }
    .item.done .item-anchor, .item.done .item-text { opacity: 0.45; text-decoration: line-through; }
    .item-anchor {
      font-size: 12px; color: #fdd663; font-style: italic; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-text { font-size: 14px; color: #e3e3e3; margin-bottom: 6px; line-height: 1.4; }
    .item-meta { display: flex; justify-content: space-between; font-size: 11px; color: #5f6368; }
    .item-url { max-width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-del {
      background: none; border: none; color: #5f6368; cursor: pointer;
      font-size: 16px; padding: 0 4px; flex-shrink: 0; border-radius: 4px; line-height: 1;
    }
    .item-del:hover { color: #f28b82; background: rgba(242,139,130,0.1); }

    .reminder-dot { width: 8px; height: 8px; border-radius: 50%; background: #f29900; flex-shrink: 0; margin-top: 6px; }

    .empty {
      text-align: center; color: #5f6368; font-size: 14px;
      padding: 64px 0; line-height: 1.8;
    }
    .panel-footer { max-width: 800px; margin: 8px auto; padding: 0 32px; }
  </style>
</head>
<body>
  <header>
    <h1>Nabu</h1>
    <div class="header-actions">
      <button class="danger" id="clear-btn">Clear history</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="threads">Threads</button>
    <button class="tab" data-tab="todos">Todos</button>
    <button class="tab" data-tab="reminders">Reminders</button>
  </div>
  <div id="tab-count"></div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search…">
  </div>

  <div class="list" id="list"></div>

  <script src="history.js"></script>
</body>
</html>
